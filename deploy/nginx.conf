# Nginx reverse proxy config for Greyhound Hub
# ─────────────────────────────────────────────────────────────────────────────
# 1. Copy this file to /etc/nginx/sites-available/greyhound-hub
# 2. Replace yourdomain.com with your actual domain (or server IP)
# 3. Symlink: sudo ln -s /etc/nginx/sites-available/greyhound-hub /etc/nginx/sites-enabled/
# 4. Test:    sudo nginx -t
# 5. Reload:  sudo systemctl reload nginx
# 6. After pointing DNS, run: sudo certbot --nginx -d yourdomain.com
#    Certbot will auto-update this file with SSL config.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # Static files served directly by Nginx (faster than Node)
    location /styles.css {
        root /var/www/greyhound-hub/public;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /app.js {
        root /var/www/greyhound-hub/public;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /logo.png {
        root /var/www/greyhound-hub/public;
        expires 7d;
        add_header Cache-Control "public";
    }

    # All other requests proxied to Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — scraping on /api/races can take a few seconds
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
